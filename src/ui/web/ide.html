<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple IDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1e1e1e;color:#ccc;display:flex;flex-direction:column;height:100vh;overflow:hidden}
        #menubar{background:#1e1e1e;border-bottom:1px solid #3e3e42;display:flex;padding:0 10px}
        .menu-item{position:relative;padding:6px 14px;cursor:pointer;font-size:13px;color:#ccc;border-radius:4px}
        .menu-item:hover{background:#2d2d30}
        .menu-item:hover .dropdown{display:block}
        .dropdown{display:none;position:absolute;top:100%;left:0;background:#252526;border:1px solid #3e3e42;border-radius:6px;min-width:200px;z-index:10000;padding:4px 0;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
        .dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;font-size:13px;color:#ccc;transition:all 0.15s}
        .dropdown-item:hover{background:#0e639c;color:#fff}
        .dropdown-item i{width:20px;margin-right:8px}
        .shortcut{color:#666;font-size:11px;margin-left:20px}
        .dropdown-separator{border-top:1px solid #3e3e42;margin:4px 0}
        #toolbar{background:#252526;border-bottom:1px solid #3e3e42;padding:6px 12px;display:flex;justify-content:space-between;align-items:center}
        .toolbar-left,.toolbar-right{display:flex;align-items:center;gap:4px}
        #toolbar button{background:none;border:none;color:#ccc;padding:6px 10px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;transition:all 0.2s}
        #toolbar button:hover{background:#2d2d30;transform:translateY(-1px)}
        #toolbar button:active{transform:scale(0.95)}
        #toolbar button i{font-size:16px;width:16px}
        .toolbar-separator{width:1px;background:#3e3e42;height:24px;margin:0 6px}
        #main-container{display:flex;flex:1;overflow:hidden}
        #explorer-panel{width:280px;min-width:0;background:#252526;border-right:1px solid #3e3e42;display:flex;flex-direction:column;overflow:hidden;transition:width 0.3s}
        #explorer-panel.collapsed{width:0!important;border-right:none}
        #explorer-panel.collapsed>*:not(#btn-toggle-explorer){display:none}
        .panel-header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#2d2d30;border-bottom:1px solid #3e3e42}
        .panel-header h3{font-size:12px;color:#969696;text-transform:uppercase}
        .explorer-actions{display:flex;gap:2px}
        .explorer-actions button{background:none;border:none;color:#ccc;padding:4px 8px;border-radius:3px;cursor:pointer;font-size:13px;transition:all 0.2s}
        .explorer-actions button:hover{background:#1e1e1e}
        #file-tree{flex:1;overflow-y:auto;padding:4px 0}
        .tree-item{display:flex;align-items:center;padding:4px 12px;cursor:pointer;font-size:13px;white-space:nowrap;transition:background 0.15s}
        .tree-item:hover{background:#2d2d30}
        .tree-item.selected{background:#0e639c}
        .tree-item .icon{margin-right:6px;width:16px;text-align:center}
        .tree-item.directory .icon{color:#e8ab53}
        .tree-toggle{width:14px;margin-right:2px;text-align:center;cursor:pointer;font-size:9px;flex-shrink:0}
        .children.collapsed{display:none}
        #editor-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
        #tabs-bar{background:#2d2d30;border-bottom:1px solid #3e3e42;display:flex}
        .tabs-container{display:flex;overflow-x:auto}
        .tab{display:flex;align-items:center;padding:8px 16px;background:#252526;border-right:1px solid #3e3e42;cursor:pointer;min-width:100px;max-width:180px;font-size:13px;transition:all 0.2s}
        .tab.active{background:#1e1e1e;border-bottom:2px solid #0e639c}
        .tab:hover{background:#2d2d30}
        .tab span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .tab-close{background:none;border:none;color:#ccc;padding:0 4px;margin-left:8px;cursor:pointer;opacity:0;transition:opacity 0.2s}
        .tab:hover .tab-close{opacity:1}
        #editor-container{flex:1;overflow:hidden}
        .CodeMirror{height:100%;font-size:14px}
        #preview-panel{display:none;flex:1;background:#fff;border-left:1px solid #3e3e42;min-width:300px}
        #preview-frame{width:100%;height:100%;border:none}
        #console-panel{height:200px;min-height:80px;background:#252526;border-top:1px solid #3e3e42;display:flex;flex-direction:column}
        #console-panel .panel-header{padding:6px 12px}
        #console-panel .panel-header button{background:none;border:none;color:#ccc;cursor:pointer;padding:2px 6px;border-radius:3px}
        #console-output{flex:1;overflow-y:auto;padding:8px 12px;font-family:Consolas,monospace;font-size:13px;user-select:text}
        .console-line{padding:1px 0;user-select:text;word-break:break-all}
        .console-line.error{color:#f44747}
        .console-line.success{color:#6a9955}
        .console-line.command{color:#4fc1ff;font-weight:bold}
        #console-input-row{display:flex;align-items:center;padding:6px 12px;background:#1e1e1e;border-top:1px solid #3e3e42}
        #console-input{flex:1;background:transparent;border:none;color:#ccc;font-family:Consolas,monospace;font-size:13px;outline:none}
        #console-input::placeholder{color:#555}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center}
        .modal.show{display:flex;animation:modalIn 0.3s ease}
        @keyframes modalIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
        .modal-content{background:#252526;border:1px solid #3e3e42;border-radius:8px;width:500px;max-width:90%}
        .modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #3e3e42}
        .modal-header h2{font-size:18px}
        .modal-close{background:none;border:none;color:#ccc;font-size:24px;cursor:pointer}
        .modal-body{padding:20px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;margin-bottom:8px;font-size:13px;color:#969696}
        .form-group select,.form-group input{width:100%;padding:8px 12px;background:#1e1e1e;border:1px solid #3e3e42;color:#ccc;border-radius:4px;font-size:13px}
        .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 20px;border-top:1px solid #3e3e42}
        .btn-primary{background:#0e639c;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer}
        .btn-secondary{background:#3e3e42;color:#ccc;border:none;padding:8px 16px;border-radius:4px;cursor:pointer}
        .context-menu{display:none;position:fixed;background:#252526;border:1px solid #3e3e42;border-radius:6px;padding:4px 0;min-width:200px;z-index:2000;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
        .context-menu.show{display:block;animation:contextIn 0.15s ease}
        @keyframes contextIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
        .context-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:13px;transition:background 0.15s}
        .context-item:hover{background:#0e639c}
        .context-item i{width:16px}
        .context-separator{border-top:1px solid #3e3e42;margin:4px 0}
        .search-popup{position:fixed;top:60px;right:20px;background:#252526;border:1px solid #0e639c;border-radius:8px;padding:12px;z-index:10001;display:none;min-width:300px}
        .search-popup.show{display:block}
        .search-row{display:flex;gap:8px;margin-bottom:8px}
        .search-row input{flex:1;padding:6px 10px;background:#1e1e1e;border:1px solid #3e3e42;color:#ccc;border-radius:4px;font-size:13px}
        .search-row button{padding:6px 10px;background:#3e3e42;border:none;color:#ccc;border-radius:4px;cursor:pointer}
        ::-webkit-scrollbar{width:8px;height:8px}
        ::-webkit-scrollbar-thumb{background:#3e3e42;border-radius:4px}
    </style>
</head>
<body>
    <div id="menubar">
        <div class="menu-item">File
            <div class="dropdown">
                <div class="dropdown-item" onclick="window.ide.explorer.createFile()"><i class="fas fa-file-plus"></i> New File</div>
                <div class="dropdown-item" onclick="window.ide.explorer.createFolder()"><i class="fas fa-folder-plus"></i> New Folder</div>
                <div class="dropdown-separator"></div>
                <div class="dropdown-item" onclick="window.ide.saveCurrentFile()"><i class="fas fa-save"></i> Save <span class="shortcut">Ctrl+S</span></div>
                <div class="dropdown-item" onclick="window.ide.closeCurrentTab()"><i class="fas fa-times"></i> Close Tab</div>
            </div>
        </div>
        <div class="menu-item">Edit
            <div class="dropdown">
                <div class="dropdown-item" onclick="window.ide.search.show()"><i class="fas fa-search"></i> Find <span class="shortcut">Ctrl+F</span></div>
                <div class="dropdown-item" onclick="window.ide.search.showReplace()"><i class="fas fa-exchange-alt"></i> Replace <span class="shortcut">Ctrl+H</span></div>
            </div>
        </div>
        <div class="menu-item">View
            <div class="dropdown">
                <div class="dropdown-item" onclick="window.ide.toggleExplorer()"><i class="fas fa-columns"></i> Toggle Explorer</div>
                <div class="dropdown-item" onclick="window.ide.console.clear()"><i class="fas fa-trash-alt"></i> Clear Console</div>
                <div class="dropdown-separator"></div>
                <div class="dropdown-item" onclick="window.ide.look()"><i class="fas fa-eye"></i> Look <span class="shortcut">Ctrl+Shift+P</span></div>
            </div>
        </div>
    </div>

    <div id="toolbar">
        <div class="toolbar-left">
            <button id="btn-back" onclick="window.location.href='index.html'" title="Back to home"><i class="fas fa-arrow-left"></i></button>
            <div class="toolbar-separator"></div>
            <button id="btn-save" title="Save current file (Ctrl+S)"><i class="fas fa-save"></i><span>Save</span></button>
            <button id="btn-run" title="Run project or start localhost for HTML"><i class="fas fa-play"></i><span>Run</span></button>
            <button id="btn-look" title="Preview HTML/SVG in side panel (Ctrl+Shift+P)"><i class="fas fa-eye"></i><span>Look</span></button>
            <button id="btn-stop" title="Stop execution or localhost"><i class="fas fa-stop"></i><span>Stop</span></button>
        </div>
        <div class="toolbar-right">
            <span id="project-name" style="color:#969696;font-size:13px;margin-right:10px"></span>
            <button id="btn-settings" title="Project settings (start file, pre-launch command)"><i class="fas fa-cog"></i><span>Project</span></button>
        </div>
    </div>

    <div id="main-container">
        <div id="explorer-panel">
            <div class="panel-header">
                <h3 id="project-root-name">Explorer</h3>
                <div class="explorer-actions">
                    <button id="btn-toggle-explorer" title="Toggle explorer" onclick="window.ide.toggleExplorer()"><i class="fas fa-chevron-left"></i></button>
                    <button id="btn-new-file" title="New file"><i class="fas fa-file-plus"></i></button>
                    <button id="btn-new-folder" title="New folder"><i class="fas fa-folder-plus"></i></button>
                </div>
            </div>
            <div id="file-tree"><div class="empty-state">Loading...</div></div>
        </div>
        <div id="editor-panel">
            <div id="tabs-bar"><div class="tabs-container"><div class="tab active"><span>untitled</span><button class="tab-close">&times;</button></div></div></div>
            <div id="editor-container"><textarea id="code-editor"></textarea></div>
            <div id="console-panel">
                <div class="panel-header"><h3>Console</h3><button id="btn-clear-console" title="Clear console"><i class="fas fa-trash-alt"></i></button></div>
                <div id="console-output"></div>
                <div id="console-input-row"><span style="color:#4fc1ff;font-weight:bold;margin-right:8px">></span><input id="console-input" placeholder="Type command..." onkeydown="if(event.key==='Enter')window.ide.console.execute(window.ide)"></div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>Project Settings</h2><button class="modal-close">&times;</button></div>
            <div class="modal-body">
                <div class="form-group"><label>Start file:</label><select id="start-file"><option value="">Select...</option></select></div>
                <div class="form-group"><label>Pre-launch command:</label><input id="pre-command" placeholder="pip install -r requirements.txt"></div>
            </div>
            <div class="modal-footer"><button class="btn-secondary modal-cancel">Cancel</button><button class="btn-primary" id="btn-save-settings">Save</button></div>
        </div>
    </div>

    <div id="context-menu" class="context-menu">
        <div class="context-item" data-action="open"><i class="fas fa-folder-open"></i> Open</div>
        <div class="context-item" data-action="new-file"><i class="fas fa-file-plus"></i> New File</div>
        <div class="context-item" data-action="new-folder"><i class="fas fa-folder-plus"></i> New Folder</div>
        <div class="context-separator"></div>
        <div class="context-item" data-action="rename"><i class="fas fa-edit"></i> Rename</div>
        <div class="context-item" data-action="delete"><i class="fas fa-trash"></i> Delete</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/search/searchcursor.min.js"></script>
    <script type="text/javascript" src="/eel.js"></script>
    <script src="js/languages.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/file-explorer.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/console.js"></script>
    <script src="js/context-menu.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
